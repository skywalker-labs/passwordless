name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, iconv, sqlite3, curl, libxml, dom
          coverage: pcov

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist

      - name: Run test suite
        run: php vendor/bin/phpunit --display-errors --display-deprecations

      - name: Run mutation testing
        run: vendor/bin/infection --min-msi=10 --min-covered-msi=10 --threads=max --no-progress
